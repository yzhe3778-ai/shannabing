<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>山那边 · 九学期</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%232b211b'/%3E%3Cpath d='M12 44h40L38 18 29 34l-5-8z' fill='%23f5efe0'/%3E%3C/svg%3E">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<style>
:root{
  --earth:#D9A441;--rice:#7BA05B;--dusk:#E8853A;--paper:#F5EFE0;
  --ink:#4A3A2A;--soft:#7a6a55;--night:#2e2620;--card:#FFFDF6;
  --red:#C25B4E;--blue:#5B7FA0;--gold:#C99A2E;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:var(--paper);color:var(--ink);overflow:hidden}
.serif{font-family:"STZhongsong","STSong","SimSun","Noto Serif SC",serif}
#root{height:100%}
.app{height:100%;display:flex;flex-direction:column;max-width:920px;margin:0 auto;position:relative;overflow:hidden}
	.btn{border:none;cursor:pointer;font-family:inherit;background:var(--ink);color:var(--paper);padding:9px 18px;border-radius:8px;font-size:14px;transition:transform .08s,opacity .2s,background .2s}
	.btn:hover{filter:brightness(1.04)}
		.btn:focus-visible,.actbtn:focus-visible,.choice:focus-visible,.tcard:focus-visible,.chat-chip:focus-visible,.chat-send:focus-visible,.chat-close:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
.btn:active{transform:translateY(1px)}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn.warm{background:var(--dusk)}.btn.green{background:var(--rice)}.btn.ghost{background:transparent;color:var(--ink);border:1.5px solid var(--ink)}
.btn.small{padding:5px 12px;font-size:12.5px}
/* HUD */
.hud{display:flex;gap:7px;padding:8px 12px;background:var(--night);color:var(--paper);font-size:13px;align-items:center;flex-wrap:wrap}
.hud .year{font-weight:700;letter-spacing:1px;margin-right:auto}
.hud .stat{display:flex;align-items:center;gap:3px;background:rgba(255,255,255,.08);padding:3px 9px;border-radius:20px}
.ap-dot{width:9px;height:9px;border-radius:50%;background:var(--dusk);display:inline-block;margin:0 1px}
.ap-dot.used{background:#5a4f40}
/* 教室 */
.stage{flex:1;overflow-y:auto;padding:14px;position:relative;display:flex;flex-direction:column}
.room-title{text-align:center;font-size:13px;color:var(--soft);margin-bottom:10px}
.room{background:
  linear-gradient(rgba(245,239,224,.14),rgba(245,239,224,.34)),
  url("assets/scene/classroom_topdown.png") center/cover no-repeat;
  border-radius:16px;padding:64px 10px 16px;box-shadow:inset 0 2px 10px rgba(74,58,42,.15);flex:1;min-height:360px}
.seatgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px 12px;max-width:500px;margin:0 auto}
.seat{background:rgba(255,253,246,.82);backdrop-filter:blur(2px);border-radius:12px;padding:5px 3px 4px;text-align:center;box-shadow:0 4px 12px rgba(46,38,32,.18);cursor:grab;border:2px solid rgba(255,253,246,.5);transition:transform .12s,border-color .12s;position:relative;touch-action:none}
.seat.dragging{opacity:.5}
.seat.over{border-color:var(--dusk);transform:scale(1.05)}
.seat.swapmode{border-color:var(--blue);animation:pulse 1s infinite}
@keyframes pulse{50%{border-color:var(--earth)}}
.seat .nm{font-size:12.5px;font-weight:600;margin-top:3px}
.seat .tg{font-size:9px;color:var(--soft)}
.seat .gone{opacity:.35}
.podium{text-align:center;color:var(--soft);font-size:12px;margin-top:12px;letter-spacing:4px}
/* 行动栏 */
.actionbar{display:flex;gap:6px;padding:8px 10px;background:var(--card);border-top:1px solid #e3d8bf;flex-wrap:wrap;justify-content:center}
	.actbtn{flex:1;min-width:72px;background:var(--paper);border:1.5px solid #e0d4ba;border-radius:10px;padding:7px 4px;text-align:center;cursor:pointer;font-family:inherit;transition:transform .1s,border-color .1s,background .2s}
.actbtn:active{transform:translateY(1px)}
.actbtn:disabled{opacity:.4;cursor:not-allowed}
	.actbtn .ic{font-size:19px;display:block;height:24px}.actbtn .ic img{width:24px;height:24px;object-fit:contain}.actbtn .lb{font-size:11.5px;display:block;margin-top:1px}
	.actbtn.go{background:var(--ink);color:var(--paper);border-color:var(--ink)}
	/* 对话 */
	.dlg-wrap{flex:1;display:flex;flex-direction:column;justify-content:flex-end;min-height:0}
	.dlg-scene{flex:1;display:flex;align-items:center;justify-content:center;min-height:220px;padding:20px 0 16px;border-radius:16px;position:relative;overflow:hidden;background:#eadfc8 center/cover no-repeat;box-shadow:inset 0 2px 12px rgba(46,38,32,.2)}
	.dlg-scene:before{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(245,239,224,.08),rgba(46,38,32,.22));z-index:0}
	.portrait{width:min(50vw,230px);height:min(38vh,320px);min-height:220px;border-radius:16px;background:linear-gradient(#fffdf6,#f1e7cf);box-shadow:0 8px 22px rgba(74,58,42,.22);display:flex;align-items:flex-end;justify-content:center;overflow:hidden;border:1px solid rgba(74,58,42,.16);position:relative;z-index:1}
.qq-avatar{display:block;border-radius:12px;object-fit:cover;background:#f5efe0;box-shadow:0 1px 4px rgba(46,38,32,.14)}
.portrait-img{display:block;width:100%;height:100%;object-fit:contain;object-position:center bottom}
.avatar-fallback{display:block}
.dlg-box{background:var(--card);border:2px solid var(--ink);border-radius:14px;padding:13px 15px 15px;box-shadow:4px 4px 0 rgba(74,58,42,.22);min-height:104px}
.dlg-name{display:inline-block;background:var(--ink);color:var(--paper);font-size:13px;padding:3px 13px;border-radius:8px;margin-bottom:7px;letter-spacing:1px}
.dlg-name.mc{background:var(--dusk)}
	.dlg-text{font-size:15px;line-height:1.8;white-space:pre-wrap}
	.dlg-text.ai{color:#3a2c1c}
	.dlg-hint{font-size:11px;color:var(--soft);text-align:right;margin-top:6px}
	.dlg-tools{text-align:right;margin-bottom:4px}
	.dlg-progress{float:right;font-size:11px;color:var(--soft);padding-top:4px}
	.choices{display:flex;flex-direction:column;gap:8px;margin-top:11px}
	.choice{background:var(--paper);border:1.5px solid var(--ink);border-radius:10px;padding:9px 13px;cursor:pointer;font-size:14px;text-align:left;font-family:inherit}
	.choice:active{background:#efe5cd}
	.free-reply{display:flex;gap:8px;margin-top:10px;align-items:center}
	.free-reply input{flex:1;border:1.5px solid #d8cab0;border-radius:10px;background:#fffaf0;color:var(--ink);padding:9px 11px;font:inherit;font-size:13px;min-width:0}
		.free-reply input:focus{outline:2px solid rgba(201,154,46,.35);border-color:var(--gold)}
		.free-reply .btn{white-space:nowrap}
		.memory-chip{font-size:10.5px;color:var(--soft);margin-left:6px}
			/* 聊天框：私聊/家访专用，VN海报式黑白网点风格 */
			.chat-stage{padding:0;overflow:hidden;background:#e9e9e5;color:#f7f7f2;isolation:isolate}
			.chat-stage:before{content:"";position:absolute;inset:0;z-index:0;background-image:radial-gradient(#151515 1px,transparent 1.35px),linear-gradient(90deg,rgba(255,255,255,.62),rgba(255,255,255,.16) 36%,rgba(255,255,255,.04) 68%),var(--chat-scene);background-size:13px 13px,100% 100%,cover;background-position:0 0,center,center;filter:grayscale(1) contrast(1.16);opacity:.96}
			.chat-stage:after{content:"";position:absolute;inset:-8% -12%;z-index:1;pointer-events:none;background:radial-gradient(ellipse at 15% 74%,rgba(0,0,0,.78) 0 16%,transparent 34%),radial-gradient(ellipse at 73% 58%,rgba(0,0,0,.48) 0 12%,transparent 30%),linear-gradient(174deg,transparent 0 42%,rgba(0,0,0,.62) 43% 61%,transparent 62%),linear-gradient(90deg,rgba(0,0,0,.08),transparent 30% 78%,rgba(0,0,0,.18));mix-blend-mode:multiply}
			.chat-shell{flex:1;min-height:0;position:relative;z-index:2;display:flex;flex-direction:column;overflow:hidden;background:transparent;border:0;border-radius:0;box-shadow:none}
			.chat-live-portrait{position:absolute;left:max(-28px,calc(50% - 470px));bottom:78px;z-index:2;width:clamp(210px,38vw,345px);height:min(73vh,560px);display:flex;align-items:flex-end;justify-content:center;pointer-events:none;filter:drop-shadow(0 0 0 #fff) drop-shadow(4px 0 0 #fff) drop-shadow(-4px 0 0 #fff) drop-shadow(0 4px 0 #fff) drop-shadow(0 -4px 0 #fff) drop-shadow(10px 16px 0 rgba(0,0,0,.72))}
			.chat-live-portrait .portrait-img{width:100%;height:100%;object-fit:contain;object-position:center bottom;filter:grayscale(.28) contrast(1.1) saturate(.85)}
			.chat-live-portrait .avatar-fallback{width:180px;height:180px;background:#f7f7f2;border:4px solid #111;border-radius:20px}
			.chat-head{position:absolute;top:12px;right:14px;z-index:5;display:flex;align-items:center;gap:10px;min-width:min(330px,58vw);max-width:calc(100% - 24px);padding:8px 10px;background:rgba(12,12,12,.62);border:1.5px solid rgba(255,255,255,.72);box-shadow:8px 8px 0 rgba(0,0,0,.18);backdrop-filter:blur(6px)}
			.chat-head .qq-avatar{border:1.5px solid rgba(255,255,255,.75);border-radius:4px;filter:grayscale(.2) contrast(1.08)}
			.chat-head-main{flex:1;min-width:0}.chat-title{font-size:17px;font-weight:800;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-shadow:0 2px 0 rgba(0,0,0,.45)}.chat-sub{font-size:11px;color:rgba(255,255,255,.68);margin-top:2px}
			.chat-close{border:none;background:rgba(255,255,255,.12);color:#fff;font-size:22px;line-height:1;cursor:pointer;padding:4px 7px;border-radius:4px}
			.chat-close:active{background:rgba(255,255,255,.24)}
			.chat-messages{position:absolute;left:clamp(168px,32vw,320px);right:18px;top:72px;bottom:118px;z-index:3;min-height:0;overflow-y:auto;padding:0 2px 10px;display:flex;flex-direction:column;justify-content:flex-end;gap:9px;background:transparent}
			.chat-messages::-webkit-scrollbar{width:5px}.chat-messages::-webkit-scrollbar-thumb{background:rgba(0,0,0,.38);border-radius:10px}
			.chat-row{display:flex;align-items:flex-end;gap:8px;max-width:min(620px,100%)}
			.chat-row.mine{align-self:flex-end;flex-direction:row-reverse}
			.chat-row.other{align-self:flex-start}
			.chat-avatar{display:none}
			.chat-bubble{border-radius:2px;padding:9px 12px;line-height:1.55;font-size:14.5px;font-weight:650;word-break:break-word;text-shadow:0 1px 0 rgba(0,0,0,.42);box-shadow:7px 7px 0 rgba(0,0,0,.18);backdrop-filter:blur(4px)}
			.chat-row.other .chat-bubble{background:rgba(28,28,28,.58);border:1.5px solid rgba(255,255,255,.54);color:#fff}
			.chat-row.mine .chat-bubble{background:rgba(0,0,0,.72);border:1.5px solid rgba(255,255,255,.72);color:#fff}
			.chat-speaker{display:inline-block;font-size:11px;font-weight:800;color:#111;background:rgba(255,255,255,.86);padding:1px 8px;margin-bottom:5px;text-shadow:none}.chat-row.mine .chat-speaker{color:#111}
			.chat-typing{display:inline-flex;gap:4px;align-items:center;height:18px}
			.chat-typing i{width:5px;height:5px;border-radius:50%;background:#fff;opacity:.55;animation:typing 1s infinite}
			.chat-typing i:nth-child(2){animation-delay:.15s}.chat-typing i:nth-child(3){animation-delay:.3s}
			@keyframes typing{50%{transform:translateY(-3px);opacity:1}}
			.chat-composer{position:absolute;left:clamp(158px,30vw,318px);right:14px;bottom:14px;z-index:4;padding:9px 10px 10px;background:rgba(12,12,12,.62);border:1.5px solid rgba(255,255,255,.72);box-shadow:7px 7px 0 rgba(0,0,0,.2);backdrop-filter:blur(7px)}
			.chat-suggestions{width:100%;display:flex;flex-direction:row;flex-wrap:nowrap;gap:6px;overflow:hidden;padding:0 0 6px;margin:0 0 7px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.38) transparent}
			.chat-suggestions::-webkit-scrollbar{height:4px}.chat-suggestions::-webkit-scrollbar-thumb{background:rgba(255,255,255,.38);border-radius:10px}
			.chat-chip{flex:1 1 0;min-width:0;border:1.5px solid rgba(255,255,255,.62);border-radius:2px;background:rgba(18,18,18,.54);color:#fff;padding:5px 10px;font:inherit;font-size:12.5px;font-weight:800;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:center;text-shadow:0 2px 0 rgba(0,0,0,.32);box-shadow:4px 4px 0 rgba(0,0,0,.16);transition:transform .12s,background .18s,border-color .18s}
			.chat-chip:hover{background:rgba(0,0,0,.76);border-color:#fff}
			.chat-chip:active{transform:translateY(1px)}
			.chat-input-row{display:flex;gap:8px;align-items:center}
			.chat-input-row input{flex:1;min-width:0;border:1.5px solid rgba(255,255,255,.72);border-radius:2px;background:rgba(255,255,255,.88);color:#111;padding:8px 10px;font:inherit;font-size:13px;font-weight:650}
			.chat-input-row input:focus{outline:2px solid rgba(255,255,255,.42);border-color:#fff}
			.chat-send{border:none;border-radius:2px;background:#fff;color:#111;padding:8px 12px;font:inherit;font-size:12.5px;font-weight:850;cursor:pointer;white-space:nowrap}
			.chat-send:disabled{opacity:.45;cursor:not-allowed}
			.settle-card{border:1.5px solid rgba(255,255,255,.72);border-radius:2px;background:rgba(12,12,12,.7);padding:12px;box-shadow:7px 7px 0 rgba(0,0,0,.22);color:#fff}
			.settle-card h4{font-size:15px;margin-bottom:5px;color:#fff}
			.settle-card p{font-size:12.5px;line-height:1.55;color:rgba(255,255,255,.82);margin:4px 0}
			.settle-tags{display:flex;gap:5px;flex-wrap:wrap;margin:7px 0}
			.settle-tags span{font-size:10.5px;border-radius:2px;background:rgba(255,255,255,.86);color:#111;padding:3px 8px;font-weight:800}
			.fx-list{display:grid;grid-template-columns:repeat(auto-fit,minmax(118px,1fr));gap:6px;margin:8px 0}
			.fx-row{border-radius:2px;background:rgba(255,255,255,.86);border:1px solid rgba(255,255,255,.32);color:#111;padding:7px 8px;font-size:12px;display:flex;justify-content:space-between;gap:6px}
			.fx-row b{font-weight:800;color:#111}
			.fx-row .neg{color:#333}
			.settle-actions{display:flex;gap:8px;margin-top:10px}
			.settle-actions .btn{flex:1}
/* 弹窗 */
.modal-bg{position:absolute;inset:0;background:rgba(46,38,32,.55);display:flex;align-items:center;justify-content:center;z-index:40;padding:14px}
	.modal{background:var(--card);border-radius:16px;padding:18px;max-width:520px;width:100%;max-height:86%;overflow-y:auto}
	.modal h3{font-size:16px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
	.shop-modal{background:linear-gradient(rgba(255,253,246,.94),rgba(255,253,246,.9)),url("assets/scene/shop.png") center/cover no-repeat}
	.log-modal{background:linear-gradient(rgba(255,253,246,.9),rgba(255,253,246,.94)),url("assets/ui/log_book.png") center top/cover no-repeat}
.detail-modal{background:linear-gradient(rgba(255,253,246,.94),rgba(250,245,230,.94))}
.detail-hero{display:flex;align-items:center;gap:14px;margin-bottom:12px}
.detail-hero .qq-avatar{width:64px;height:64px;border-radius:16px}
.detail-name{font-size:17px;font-weight:700}
.detail-sub{font-size:12px;color:var(--soft)}
.detail-section{margin-bottom:10px}
.detail-section .label{font-size:11px;color:var(--soft);margin-bottom:3px;letter-spacing:1px}
.detail-blurb{font-size:13px;line-height:1.65;background:var(--paper);border-radius:10px;padding:10px 12px}
.detail-family{font-size:13px;line-height:1.55;margin-bottom:4px}
.detail-status{font-size:12.5px;padding:8px 10px;border-radius:8px;background:rgba(194,91,78,.08);color:var(--red);line-height:1.5;margin-top:10px}

	.shop-item{display:flex;align-items:center;gap:10px;padding:8px 10px;margin-bottom:8px;border:1px solid rgba(122,106,85,.18);border-radius:12px;background:rgba(255,253,246,.78);box-shadow:0 2px 8px rgba(74,58,42,.08)}
	.shop-icon{width:52px;height:46px;object-fit:contain;flex:0 0 auto}
	.shop-item .info{flex:1}.shop-item .nm{font-size:14px;font-weight:600}.shop-item .ds{font-size:11.5px;color:var(--soft)}
.row{display:flex;align-items:center;gap:8px}
.bar{height:8px;background:#eadfc8;border-radius:4px;overflow:hidden;flex:1}
.bar i{display:block;height:100%;border-radius:4px}
	.stu-row{display:flex;align-items:center;gap:9px;padding:8px;border-radius:10px;cursor:pointer}
	.stu-row:active{background:var(--paper)}
	.visit-modal{background:linear-gradient(rgba(255,253,246,.92),rgba(245,239,224,.92)),url("assets/scene/road.png") center/cover no-repeat}
	.visit-note{font-size:12px;color:var(--soft);line-height:1.55;margin:-3px 0 12px}
	.visit-map{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
	.house-card{border:1.5px solid rgba(74,58,42,.2);border-radius:12px;background:rgba(255,253,246,.86);padding:10px 8px 9px;text-align:left;font:inherit;color:var(--ink);cursor:pointer;min-height:142px;box-shadow:0 5px 14px rgba(46,38,32,.13);transition:transform .12s,border-color .15s,background .15s}
	.house-card:hover{border-color:var(--dusk);background:rgba(255,253,246,.96);transform:translateY(-1px)}
	.house-card:active{transform:translateY(1px)}
	.house-top{display:flex;align-items:center;gap:8px;margin-bottom:6px}
	.house-icon{width:38px;height:34px;position:relative;flex:0 0 38px}
	.house-icon:before{content:"";position:absolute;left:4px;right:4px;bottom:0;height:22px;background:#f5efe0;border:2px solid var(--ink);border-top:0;box-shadow:3px 3px 0 rgba(74,58,42,.16)}
	.house-icon:after{content:"";position:absolute;left:4px;top:1px;width:28px;height:28px;background:var(--dusk);border:2px solid var(--ink);transform:rotate(45deg);clip-path:polygon(0 0,100% 0,100% 100%,0 100%)}
	.house-door{position:absolute;left:15px;bottom:0;width:9px;height:15px;background:var(--ink);z-index:2;border-radius:4px 4px 0 0}
	.house-card:nth-child(3n+1) .house-icon:after{background:var(--rice)}
	.house-card:nth-child(3n+2) .house-icon:after{background:var(--earth)}
	.house-name{font-size:14px;font-weight:800}
	.house-meta{font-size:10.5px;color:var(--soft);margin-top:1px}
	.house-family{font-size:11.5px;line-height:1.45;color:#5d4d3d;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:33px}
	.house-bars{margin-top:8px;display:grid;gap:4px}
	.house-mini{display:grid;grid-template-columns:48px 1fr 24px;align-items:center;gap:5px;font-size:10.5px;color:var(--soft)}
	.house-mini i{height:5px;border-radius:10px;background:#e2d4ba;overflow:hidden}
	.house-mini i:before{content:"";display:block;height:100%;width:var(--w);background:var(--c)}
	@media(max-width:540px){
	  .visit-map{grid-template-columns:repeat(2,1fr);gap:8px}
	  .house-card{min-height:134px;padding:9px 7px}
	}
	.status-txt{font-size:12px;color:var(--red);line-height:1.4}
.seat-info{position:absolute;top:3px;right:3px;width:22px;height:22px;border-radius:50%;border:1px solid #d8c9a6;background:var(--card);cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;padding:0;z-index:2;line-height:1;transition:transform .08s,background .15s}
.seat-info:active{transform:scale(.9);background:var(--paper)}
.attr-line{display:flex;align-items:center;gap:8px;font-size:12px;margin:5px 0}
.attr-line span{width:56px;color:var(--soft)}
.attr-line b{width:34px;text-align:right;font-size:12px}
/* 小游戏 */
.mini{flex:1;position:relative;background:linear-gradient(#cfe3ee,#f0dfb6);border-radius:14px;overflow:hidden;touch-action:none}
.coin{position:absolute;width:38px;height:38px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#ffe89a,#d9a441);border:2px solid #b07f1e;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;box-shadow:0 2px 5px rgba(0,0,0,.2)}
.mini-hud{position:absolute;top:8px;left:0;width:100%;display:flex;justify-content:space-between;padding:0 12px;font-size:14px;font-weight:700;color:var(--ink);z-index:2}
/* 标题/结局 */
.titlepage{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:linear-gradient(#bcd8e8 0%,#f0dfb6 55%,#e8c98a 100%);position:relative;overflow:hidden;padding:20px}
.titlepage h1{font-size:50px;letter-spacing:12px;text-shadow:2px 3px 0 rgba(255,255,255,.5);z-index:2}
.titlepage .tag{color:var(--soft);letter-spacing:4px;font-size:13px;margin-bottom:18px;z-index:2}
.title-mtn{position:absolute;bottom:0;left:0;width:100%;z-index:1}
.toast{position:absolute;top:62px;left:50%;transform:translateX(-50%);background:var(--night);color:var(--paper);padding:8px 18px;border-radius:20px;font-size:13px;z-index:60;box-shadow:0 4px 14px rgba(0,0,0,.3);max-width:88%;text-align:center;animation:pop .25s}
@keyframes pop{from{opacity:0;transform:translate(-50%,-6px)}to{opacity:1;transform:translate(-50%,0)}}
.spinner{width:30px;height:30px;border:3px solid #e3d8bf;border-top-color:var(--dusk);border-radius:50%;animation:spin .8s linear infinite;margin:18px auto}
@keyframes spin{to{transform:rotate(360deg)}}
	.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-top:8px}
	.tcard{background:var(--card) center/cover no-repeat;border-radius:12px;padding:15px 13px 13px;cursor:pointer;border:1px solid rgba(74,58,42,.16);box-shadow:0 4px 14px rgba(74,58,42,.14);position:relative;overflow:hidden;min-height:188px}
	.tcard:after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,253,246,.34),rgba(255,253,246,.88) 42%,rgba(255,253,246,.96));z-index:0}
	.tcard>*{position:relative;z-index:1}
	.tcard:active{border-color:var(--earth);transform:translateY(1px)}
	.tcard .cat{font-size:11px;padding:2px 8px;border-radius:10px;color:#fff;display:inline-block;margin-bottom:7px}
	.tcard h4{font-size:14px;margin-bottom:5px}.tcard p{font-size:12px;color:var(--soft);line-height:1.5;min-height:34px}
	.tcard .fx{font-size:11.5px;color:var(--soft);margin-top:8px}
	.settle-scene{min-height:230px;border-radius:16px;padding:34px 14px 18px;background:#eadfc8 center/cover no-repeat;display:flex;align-items:flex-end;box-shadow:inset 0 2px 12px rgba(46,38,32,.22);position:relative;overflow:hidden}
	.settle-scene:before{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(245,239,224,.1),rgba(46,38,32,.36));}
	.settle-scene .dlg-box{position:relative;z-index:1}
.endbox{background:rgba(255,255,255,.88);border-radius:14px;padding:20px;max-width:360px;margin:0 auto;font-size:14px;line-height:2;z-index:2}
	@media(max-height:700px){
	  .stage{padding:10px}
	  .chat-stage{padding:0}
	  .room{padding-top:48px;min-height:320px}
		  .seatgrid{gap:7px 10px}
		  .seat{padding:4px 3px 3px}
		  .dlg-scene{min-height:190px;padding-top:12px}
		  .portrait{min-height:190px}
		}
	@media(max-width:540px){
	  .chat-head{top:10px;right:10px;min-width:0;width:calc(100% - 20px);box-shadow:5px 5px 0 rgba(0,0,0,.16)}
	  .chat-live-portrait{left:-48px;bottom:122px;width:205px;height:58vh;opacity:.96}
	  .chat-messages{left:112px;right:10px;top:72px;bottom:116px;gap:7px}
	  .chat-bubble{font-size:13px;padding:8px 9px;box-shadow:5px 5px 0 rgba(0,0,0,.16)}
	  .chat-composer{left:10px;right:10px;bottom:10px;padding:8px 9px 9px;box-shadow:6px 6px 0 rgba(0,0,0,.18)}
	  .chat-suggestions{gap:6px;overflow-x:auto;overflow-y:hidden;padding-bottom:5px;margin-bottom:6px}
	  .chat-chip{flex:0 0 auto;max-width:74vw;font-size:12px;padding:5px 9px}
	  .chat-input-row input{font-size:12.5px;padding:8px 9px}
	  .chat-send{padding:8px 11px}
	}
	/* ===== 动效 / 转场 / 反馈特效 ===== */
	@keyframes phase-in{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
	@keyframes modal-in{from{opacity:0;transform:translateY(14px) scale(.98)}to{opacity:1;transform:none}}
	@keyframes seat-bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-2.5px)}}
	.stage{animation:phase-in .34s ease both}
	.modal{animation:modal-in .24s ease both}
	.titlepage{animation:phase-in .5s ease both}
	.seat:not(.dragging):not(.gone){animation:seat-bob 3.4s ease-in-out infinite}
	.seat:nth-child(2){animation-delay:.4s}.seat:nth-child(3){animation-delay:.8s}.seat:nth-child(4){animation-delay:1.2s}
	.seat:nth-child(5){animation-delay:.6s}.seat:nth-child(6){animation-delay:1s}.seat:nth-child(7){animation-delay:.2s}
	.seat:nth-child(8){animation-delay:1.4s}.seat:nth-child(9){animation-delay:.9s}
	.seat:active,.seat.over{animation:none}
	@keyframes seat-perk{0%,100%{box-shadow:0 4px 12px rgba(46,38,32,.18)}40%{box-shadow:0 0 0 3px rgba(217,164,65,.7),0 6px 16px rgba(217,164,65,.4);filter:brightness(1.08)}}
	.seat.perk{animation:seat-perk 1s ease}
	.seat.atrisk{border-color:var(--red)!important;box-shadow:0 0 0 2px rgba(194,91,78,.5),0 4px 12px rgba(194,91,78,.3)}
	.risk-badge{position:absolute;top:3px;left:3px;font-size:12px;z-index:2;filter:drop-shadow(0 1px 1px rgba(0,0,0,.3));animation:risk-blink 1.1s infinite}
	@keyframes risk-blink{50%{opacity:.35}}
	.predict-bar{font-size:12.5px;color:var(--ink);background:var(--paper);border-radius:8px;padding:7px 10px;margin-bottom:10px;line-height:1.5}
	.predict-bar b{color:var(--dusk)}
	.togo{font-size:12px;color:var(--soft);margin-top:4px}
	.togo b{color:var(--red)}
	/* 打工零工 */
	.work-card{background:var(--card);border-radius:16px;padding:22px 18px;max-width:440px;margin:10px auto 0;box-shadow:0 4px 16px rgba(74,58,42,.14);text-align:center}
	.work-q{font-size:18px;line-height:1.7;margin-bottom:18px}
	.work-q b{color:var(--dusk)}
	.work-opts{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
	.work-opt{font-family:inherit;font-size:18px;font-weight:700;padding:14px 8px;border:1.5px solid #e0d4ba;border-radius:12px;background:var(--paper);color:var(--ink);cursor:pointer;transition:transform .1s,background .15s}
	.work-opt:active{transform:scale(.96)}
	.work-opt:disabled{opacity:.5;cursor:not-allowed}
	.work-score{margin-top:16px;font-size:14px;font-weight:700;color:var(--rice)}
	.coin.bad{background:radial-gradient(circle at 35% 30%,#caa,#8a5a44);border-color:#5d4634}
	.stroke{position:absolute;width:46px;height:46px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#ffe89a,#e8c14a);border:3px solid #fff;display:flex;align-items:center;justify-content:center;font-size:24px;color:#a8463b;cursor:pointer;box-shadow:0 0 0 0 rgba(255,255,255,.6);animation:stroke-pulse 1.1s ease forwards}
	@keyframes stroke-pulse{0%{transform:scale(.4);opacity:.4;box-shadow:0 0 0 14px rgba(255,255,255,.0)}25%{transform:scale(1.1);opacity:1}100%{transform:scale(.8);opacity:.5}}
	/* 卖菜滑块 */
	.slider-val{font-size:30px;font-weight:800;color:var(--dusk);margin:6px 0}
	.work-slider{width:90%;height:30px;cursor:grab}
	/* 挑水蓄力 */
	.water-wrap{max-width:420px;margin:14px auto 0;text-align:center;display:flex;flex-direction:column;align-items:center}
	.water-gauge{position:relative;width:74px;height:220px;background:linear-gradient(#dfeaf2,#cfe0ee);border:3px solid #5B7FA0;border-radius:12px;overflow:hidden;box-shadow:inset 0 2px 8px rgba(46,38,32,.15)}
	.water-target{position:absolute;left:0;width:100%;background:rgba(123,160,91,.5);border-top:2px solid var(--rice);border-bottom:2px solid var(--rice)}
	.water-fill{position:absolute;left:0;bottom:0;width:100%;background:linear-gradient(#7fb0d8,#5B7FA0);transition:height .03s linear}
	.water-mark{position:absolute;left:0;width:100%;height:3px;background:#fff;box-shadow:0 0 4px rgba(0,0,0,.3)}
	.water-rope{margin-top:16px;font-family:inherit;font-size:16px;font-weight:700;padding:16px 30px;border:none;border-radius:14px;background:var(--blue);color:#fff;cursor:pointer;user-select:none;touch-action:none;box-shadow:0 4px 0 #46637e}
	.water-rope:active{transform:translateY(3px);box-shadow:0 1px 0 #46637e}
	.water-rope:disabled{opacity:.5}
	/* 接稻：竹筐+落物 */
	.mini{touch-action:none}
	.fall-item{position:absolute;width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:30px;transform:translate(-50%,-50%);pointer-events:none}
	.basket{position:absolute;bottom:2%;width:64px;height:48px;display:flex;align-items:center;justify-content:center;font-size:42px;transform:translateX(-50%);pointer-events:none;filter:drop-shadow(0 3px 3px rgba(0,0,0,.3))}
	/* 写春联时机条 */
	.couplet-bar{position:relative;width:90%;height:26px;margin:6px auto 0;background:rgba(255,255,255,.25);border:2px solid #fff;border-radius:14px;overflow:hidden}
	.couplet-zone{position:absolute;top:0;height:100%;background:rgba(255,232,138,.85);box-shadow:0 0 8px rgba(255,232,138,.8)}
	.couplet-marker{position:absolute;top:-4px;width:5px;height:34px;background:#fff;border-radius:3px;transform:translateX(-50%);box-shadow:0 0 6px rgba(0,0,0,.35)}
	.actbtn:active,.choice:active,.chat-chip:active,.tcard:active,.house-card:active{transform:scale(.96)}
	@keyframes float-up{0%{opacity:0;transform:translate(-50%,4px) scale(.85)}15%{opacity:1;transform:translate(-50%,-2px) scale(1.05)}100%{opacity:0;transform:translate(-50%,-46px) scale(1)}}
	.float-num{position:fixed;z-index:90;pointer-events:none;font-weight:800;font-size:17px;text-shadow:0 2px 4px rgba(0,0,0,.35),0 0 2px rgba(255,255,255,.5);color:var(--rice);transform:translate(-50%,0);animation:float-up 1.05s ease-out forwards;white-space:nowrap}
	@keyframes app-shake{10%,90%{transform:translateX(-2px)}20%,80%{transform:translateX(4px)}30%,50%,70%{transform:translateX(-7px)}40%,60%{transform:translateX(7px)}}
	.fx-shake{animation:app-shake .5s cubic-bezier(.36,.07,.19,.97)}
	@keyframes flash-fade{0%{opacity:0}25%{opacity:.55}100%{opacity:0}}
	.fx-flash{position:fixed;inset:0;z-index:85;pointer-events:none;background:rgba(91,127,160,.5);animation:flash-fade .5s ease-out forwards}
	.hud .mute{margin-left:2px;background:rgba(255,255,255,.1);border:none;color:var(--paper);cursor:pointer;font-size:14px;border-radius:50%;width:28px;height:28px;line-height:1}
	.hud .mute:active{transform:scale(.9)}
	@media(prefers-reduced-motion:reduce){.stage,.modal,.titlepage,.seat,.float-num,.fx-shake{animation:none!important}}
	</style>
</head>

<script>
/* =================================================================
   引擎层 · ENGINE — 纯函数 + 总管(reducer)。无 JSX，可被 node 单测。
   所有数值改动都经过这里，统一存档。
   ================================================================= */
(function(){
const D = window.GAME_DATA;
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
	const rnd=a=>a[Math.floor(Math.random()*a.length)];
	const ri=(a,b)=>a+Math.floor(Math.random()*(b-a+1));
	const interestMod=iv=>1+(clamp(iv,0,10)-5)*0.1;     // 学习增量修正

const store={
  get(k){try{return JSON.parse(localStorage.getItem(k))}catch(e){return null}},
  set(k,v){try{localStorage.setItem(k,JSON.stringify(v));return true}catch(e){return false}},
	  del(k){try{localStorage.removeItem(k)}catch(e){}}
	};

	function blankMemories(students){
	  const out={};
	  students.forEach(s=>{ out[s.id]={summary:'', notes:[], interactions:[]}; });
	  return out;
	}
	function ensureMemories(state){
	  const memories={...(state.memories||{})};
	  (state.students||[]).forEach(s=>{
	    if(!memories[s.id]) memories[s.id]={summary:'',notes:[],interactions:[]};
	    else memories[s.id]={
	      summary:memories[s.id].summary||'',
	      notes:Array.isArray(memories[s.id].notes)?memories[s.id].notes.slice(-12):[],
	      interactions:Array.isArray(memories[s.id].interactions)?memories[s.id].interactions.slice(-12):[]
	    };
	  });
	  const students=(state.students||[]).map(s=>Array.isArray(s.flags)?s:{...s,flags:[]});
	  return {...state, memories, students,
	    recentCards:Array.isArray(state.recentCards)?state.recentCards:[],
	    termMods:state.termMods||{},
	    termEvent:state.termEvent||null,
	    pendingTermEvent:state.pendingTermEvent||null,
	    shownMilestones:Array.isArray(state.shownMilestones)?state.shownMilestones:[],
	    qingyunUsed:state.qingyunUsed||0,
	    qingyunThisTerm:!!state.qingyunThisTerm,
	    tutorialDone:!!state.tutorialDone };
	}
		function appendCharacterMemory(state, id, entry){
		  if(!id) return state;
		  const base=ensureMemories(state);
		  const cur=base.memories[id]||{summary:'',notes:[],interactions:[]};
		  const note=entry.note||entry.choice||entry.text||'';
	  const notes=note ? [...(cur.notes||[]), note].slice(-12) : (cur.notes||[]).slice(-12);
	  const interactions=[...(cur.interactions||[]), entry].slice(-12);
		  const summary=entry.summary || cur.summary || notes.slice(-3).join('；');
		  return {...base, memories:{...base.memories,[id]:{summary,notes,interactions}}};
		}
		function compactMessages(lines){
		  return (Array.isArray(lines)?lines:[])
		    .map(x=>({
		      speaker:String((x&&x.speaker)||'').slice(0,12),
		      text:String((x&&(x.text||x.t))||'').slice(0,120)
		    }))
		    .filter(x=>x.text)
		    .slice(-12);
		}

/* 新存档 */
function newGame(){
  const students=D.STUDENTS.map((s,i)=>({
    id:s.id,name:s.name,talent:s.talent,talentShown:s.shown,
    study:0, interest:0, press:10, fam:s.fam, trust:s.trust,
    per:s.per, family:s.family, tag:s.tag, seat:i, dropped:false, status:'', flags:[]
  }));
	  return {
		    v:4, term:1, ap:D.AP, fund:D.START_FUND,
	    students,
	    phase:'dialogue',            // classroom|dialogue|minigame|taskcard|settle|ending|termevent
	    dialogue:{...D.INTRO_DIALOGUE},
	    pendingEvent:null,           // {text,scene} 学期事件
	    drawn:null, roundResult:null,
	    recentCards:[],              // 最近5学期任务卡类别(连锁判定)
	    termMods:{},                 // 本学期修正(突发事件设置,如 visitMult)
	    termEvent:null,              // 当前待决策的突发事件实例
	    pendingTermEvent:null,       // 里程碑剧情后待播的突发事件
	    shownMilestones:[],          // 已播放的里程碑学期
	    qingyunUsed:0,               // 平步青云累计使用次数(价格递增)
	    qingyunThisTerm:false,       // 本学期是否已用平步青云
	    tutorialDone:false,          // 新手提示是否已出
	    swapMode:false, log:[], memories:blankMemories(students)
	  };
	}

/* 应用一组 fx 到指定学生（学习经兴趣修正） */
function applyFxToStudent(stu, fx){
  const s={...stu};
  if(fx.study)    s.study   = clamp(s.study + fx.study*interestMod(s.interest), 0,100);
  if(fx.interest) s.interest= clamp(s.interest+fx.interest, 0,10);
  if(fx.press)    s.press   = clamp(s.press + fx.press, 0,100);
  if(fx.fam)      s.fam     = clamp(s.fam + fx.fam, 0,100);
  if(fx.trust)    s.trust   = clamp(s.trust + fx.trust, 0,100);
  if(fx.qingyun)  s.study   = D.WIN;
  return s;
}
function mapStu(state, id, fn){
  return {...state, students: state.students.map(s=> s.id===id ? fn(s) : s)};
}

/* 本地实时状态文案（AI失败兜底）：按属性出一句 */
function localStatus(s){
  if(s.dropped) return '已经离开了学校……';
  if(s.fam>=70) return '魂不守舍,像有桩心事压着没说出口';
  if(s.press>=75) return '眉头锁着,橡皮屑撒了一桌';
  if(s.interest<=2) return '提不起劲,上课总望着窗外的山';
  if(s.study>=D.WIN) return '眼里有了光,像看见了山那边';
  if(s.trust>=60) return '见你来了,远远就笑着打招呼';
  if(s.interest>=7) return '最近劲头很足,作业本边都画满了';
  return '安安静静的,像在等谁拉一把';
}

/* 走出大山结算 */
function computeResult(state){
  const alive=state.students.filter(s=>!s.dropped);
  const out=alive.filter(s=>s.study>=D.WIN).length;
  const dropped=state.students.filter(s=>s.dropped).length;
  const arch = (out>=6&&dropped===0)?'丰收' : (out>=1)?'及格' : '遗憾';
  return {out, dropped, total:state.students.length, arch,
    names: alive.filter(s=>s.study>=D.WIN).map(s=>s.name)};
}

/* 抽3张任务卡（保证含不同类别） */
function drawCards(){
  const pool=[...D.CARDS]; const picked=[]; const cats=new Set();
  let guard=0;
  while(picked.length<3 && guard++<50){
    const c=rnd(pool);
    if(picked.find(p=>p.id===c.id)) continue;
    if(picked.length===2 && cats.size<2 && cats.has(c.cat)) continue;
    picked.push(c); cats.add(c.cat);
  }
  while(picked.length<3) picked.push(rnd(pool));
  return picked;
}

/* 连锁判定：最近连续3学期同类任务卡 → 触发连锁效应 */
function checkChain(recent){
  const r=Array.isArray(recent)?recent:[];
  if(r.length<3) return null;
  const last3=r.slice(-3);
  if(last3.every(c=>c==='interest')) return {id:'talent_chain', title:'天赋觉醒前兆', talentReveal:0.35,
    log:'🔗 连锁·天赋觉醒前兆：连着几堂兴趣课，孩子们身上的光更藏不住了'};
  if(last3.every(c=>c==='study')) return {id:'pressure_chain', title:'高压临界', classFx:{press:12}, studyMult:0.15,
    log:'🔗 连锁·高压临界：连轴的学习课把弦绷到了极限，逼出了成绩，也压垮了情绪'};
  if(last3.every(c=>c==='care')) return {id:'warmth_chain', title:'班级如家', classFx:{trust:4},
    log:'🔗 连锁·班级如家：连着的关怀让教室像个家，孩子们更信你了'};
  return null;
}

/* 抽取一个本学期突发事件（满足 minTerm，按概率）。term1 不触发，term2 降频 */
function rollTermEvent(state){
  const term=state.term;
  if(term<2) return null;
  const prob = term===2 ? 0.35 : 0.6;
  if(Math.random()>prob) return null;
  const pool=D.TERM_EVENTS.filter(e=>term>=(e.minTerm||2));
  if(!pool.length) return null;
  const e=rnd(pool);
  const alive=state.students.filter(s=>!s.dropped);
  let crisisId=null, name='';
  if(e.crisis && alive.length){ const t=rnd(alive); crisisId=t.id; name=t.name; }
  const fill=s=>String(s||'').replace(/\{S\}/g,name);
  return {id:e.id, scene:e.scene, crisisId,
    title:fill(e.title), desc:fill(e.desc),
    opts:e.opts.map(o=>({...o, t:fill(o.t)}))};
}

/* 学期结算：应用任务卡到全班 → 连锁 → 压迫漂移 → 辍学 → 取一条事件 */
function settleTerm(state, card){
  const chain=checkChain(state.recentCards);
  let students=state.students.map(s=>{
    if(s.dropped) return s;
    let ns=applyFxToStudent(s, card.fx);
    if(chain && chain.classFx) ns=applyFxToStudent(ns, chain.classFx);
    if(chain && chain.studyMult && card.fx.study) ns=applyFxToStudent(ns, {study:card.fx.study*chain.studyMult});
    if(chain && chain.talentReveal && ns.talent!=='none' && !ns.talentShown && Math.random()<chain.talentReveal) ns={...ns, talentShown:true};
    if(ns.press>80) ns.interest=clamp(ns.interest-1,0,10);   // 高压掉兴趣
    ns.fam=clamp(ns.fam+D.FAM_DRIFT,0,100);                   // 家庭压迫自然上涨
    return ns;
  });
  // 座位相邻影响：每学期同桌按性格互相施加小修正(3×3网格,上下左右)
  const NB={'静':{study:1},'闹':{press:2,study:-1},'暖':{trust:1,press:-1},'敏感':{}};
  const bySeat={}; students.forEach(s=>{bySeat[s.seat]=s;});
  const neighborsOf=seat=>{const r=Math.floor(seat/3),c=seat%3,out=[];
    [[r,c-1],[r,c+1],[r-1,c],[r+1,c]].forEach(([rr,cc])=>{if(rr>=0&&rr<3&&cc>=0&&cc<3)out.push(rr*3+cc);}); return out;};
  students=students.map(s=>{ if(s.dropped) return s;
    let ns=s; neighborsOf(s.seat).forEach(ni=>{const nb=bySeat[ni]; if(nb&&!nb.dropped){const fx=NB[nb.tag]; if(fx) ns=applyFxToStudent(ns,fx);}});
    return ns;
  });
  const dropouts=[];
  students=students.map(s=>{
    if(!s.dropped && s.fam>=D.DROP_FAM && s.trust<D.DROP_TRUST){dropouts.push(s.name);return {...s,dropped:true};}
    return s;
  });
  const alive=students.filter(s=>!s.dropped);
	  const picked=alive.length? rnd(D.EVENTS) : {scene:'ending_office',t:'教室空了一角。'};
	  const evt={text:picked.t.replace(/\{S\}/g, alive.length?rnd(alive).name:''), scene:picked.scene||'classroom_topdown'};
  const log=[`📋 第${state.term}学期:${card.title}`];
  if(chain) log.push(chain.log);
  dropouts.forEach(n=>log.push(`❌ ${n}辍学离开了……家庭压迫太大,信任不够`));
  return {students, evt, dropouts, log, chain};
}

/* ============ 总管 reducer：所有操作的唯一入口 ============ */
function reducer(state, a){
  switch(a.type){
    case 'NEW': return newGame();
	    case 'LOAD': return ensureMemories(a.save);

    case 'SWAP_MODE': return {...state, swapMode:a.on};

    case 'SWAP_SEATS': {                      // a.i,a.j 为座位号
      if(state.ap<=0) return state;
      const arr=[...state.students];
      const A=arr.find(s=>s.seat===a.i), B=arr.find(s=>s.seat===a.j);
      if(!A||!B||A.id===B.id) return state;
      const students=state.students.map(s=>{
        if(s.id===A.id) return {...s,seat:a.j};
        if(s.id===B.id) return {...s,seat:a.i};
        return s;
      });
      const key=A.tag+'+'+B.tag;
      const line=D.SWAP[key]||D.SWAP._default;
      const fx=D.SWAP_FX[key]||D.SWAP_FX._default;
      let st={...state, students, swapMode:false, ap:state.ap-1};
      st=mapStu(st,A.id,s=>applyFxToStudent(s,fx));
      st=mapStu(st,B.id,s=>applyFxToStudent(s,fx));
	      st.dialogue={who:'换位',mc:false,kind:'swap',scene:'classroom_topdown',lead:`${A.name} 和 ${B.name} 换了座。\n${line}`,opts:null,studentId:null};
      st.phase='dialogue';
      return st;
    }

	    case 'OPEN_DIALOGUE':                      // a.dialogue 由组件准备好(AI或本地)
	      if(state.ap<=0 && a.cost) return state;
	      return {...state, phase:'dialogue', dialogue:a.dialogue, ap: a.cost? state.ap-1 : state.ap};
	    case 'UPDATE_DIALOGUE':
	      return {...state, dialogue:a.dialogue};
	    case 'ADD_MEMORY':
	      return appendCharacterMemory(state, a.studentId, a.entry||{});

	    case 'RESOLVE_DIALOGUE': {                 // a.fx,a.studentId,a.unlock
	      let st={...state};
		      if(a.studentId && a.fx){
			      let fx=a.fx;
			      if(state.dialogue && state.dialogue.kind==='visit' && state.termMods && state.termMods.visitMult && fx.fam){
			        fx={...fx, fam: Math.round(fx.fam*state.termMods.visitMult)};   // 暴雨等修正:家访效果打折
			      }
			      st=mapStu(st,a.studentId,s=>applyFxToStudent(s,fx));
		      }
		      if(a.studentId && a.unlock) st=mapStu(st,a.studentId,s=>({...s,talentShown:true}));
		      if(a.studentId && a.newPer) st=mapStu(st,a.studentId,s=>({...s,per:a.newPer}));
		      if(a.studentId && a.statusUpdate) st=mapStu(st,a.studentId,s=>({...s,status:a.statusUpdate}));
			      if(a.studentId) st=appendCharacterMemory(st,a.studentId,{
			        term:state.term,
			        kind:state.dialogue&&state.dialogue.kind,
			        choice:a.choiceText||'结束对话',
			        outcomeTag:a.outcomeTag,
			        settlementTitle:a.settlementTitle,
			        note:a.memoryNote || `第${state.term}学期${state.dialogue&&state.dialogue.kind==='visit'?'家访':'私聊'}:老师选择「${a.choiceText||'结束对话'}」。`,
			        summary:a.memorySummary,
			        messages:a.messages || [...compactMessages(state.dialogue&&state.dialogue.lines),{speaker:'老师',text:String(a.choiceText||'结束对话').slice(0,120)}].slice(-12)
			      });
	      st.dialogue=null; st.phase='classroom';
	      return st;
	    }
    case 'CLOSE_DIALOGUE':
      if(state.dialogue && state.dialogue.kind==='story' && state.pendingTermEvent)   // 里程碑剧情后接突发事件
        return {...state, dialogue:null, termEvent:state.pendingTermEvent, pendingTermEvent:null, phase:'termevent'};
      return {...state, dialogue:null, phase:'classroom'};

    case 'WORK_DONE':                          // a.amount 小游戏得分
      return {...state, fund:state.fund + clamp(a.amount,0,200), ap:state.ap-1, phase:'classroom'};
    case 'GO_MINIGAME':
      if(state.ap<=0) return state;
      return {...state, phase:'minigame'};
    case 'CANCEL_MINIGAME': return {...state, phase:'classroom'};

    case 'REST': {
      if(state.ap<=0) return state;
      const students=state.students.map(s=> s.dropped?s:applyFxToStudent(s,{press:-8}));
      return {...state, students, ap:state.ap-1};
    }

    case 'BUY': {                              // a.item,a.studentId
      const it=D.SHOP.find(x=>x.id===a.item); if(!it) return state;
      const stu=state.students.find(s=>s.id===a.studentId);
      if(!stu||stu.dropped) return state;
      if(it.onlyTalent && !stu.talentShown) return state;
      if(it.perTermOnce && state.qingyunThisTerm) return state;          // 本学期已用过平步青云
      const price = it.qingyun ? it.price + (state.qingyunUsed||0)*200 : it.price;  // 平步青云价格递增
      if(state.fund<price) return state;
      let st={...state, fund:state.fund-price};
      st=mapStu(st,a.studentId,s=>applyFxToStudent(s, it.qingyun?{qingyun:true}:it.fx));
      if(it.qingyun) st={...st, qingyunUsed:(st.qingyunUsed||0)+1, qingyunThisTerm:true};
      return st;
    }

    case 'NEXT_TERM':
      return {...state, phase:'taskcard', drawn:drawCards()};

    case 'PICK_CARD': {                        // a.card
      const recentCards=[...(state.recentCards||[]), a.card.cat].slice(-5);
      const r=settleTerm({...state, recentCards}, a.card);
      return {...state, recentCards, students:r.students, pendingEvent:r.evt, log:r.log, phase:'settle'};
    }

    case 'CONTINUE': {                         // 结算页点继续
      if(state.term>=D.TERMS){
        return {...state, phase:'ending', roundResult:computeResult(state)};
      }
      const students=state.students.map(s=>({...s, status:''}));  // 清空状态待刷新
      const nt=state.term+1;
      const ns={...state, term:nt, ap:D.AP, pendingEvent:null, drawn:null, termMods:{}, qingyunThisTerm:false, students};
      const te=rollTermEvent(ns);                // 本学期突发事件(可能为null)
      const ms=D.MILESTONES[nt];                 // 里程碑剧情优先,播完再接突发事件
      if(ms && !ns.shownMilestones.includes(nt)){
        return {...ns, shownMilestones:[...ns.shownMilestones, nt], pendingTermEvent:te||null,
          dialogue:{...ms, who:'', studentId:null}, phase:'dialogue'};
      }
      return {...ns, termEvent:te||null, phase: te?'termevent':'classroom'};
    }

    case 'RESOLVE_TERM_EVENT': {                // a.opt 玩家所选选项
      const opt=a.opt||{}; let st={...state};
      if(opt.fund) st={...st, fund:Math.max(0, st.fund+opt.fund)};
      if(opt.classFx) st={...st, students:st.students.map(s=> s.dropped?s:applyFxToStudent(s,opt.classFx))};
      if(opt.selfFx && st.termEvent && st.termEvent.crisisId) st=mapStu(st, st.termEvent.crisisId, s=>applyFxToStudent(s,opt.selfFx));
      st.termMods={...(st.termMods||{}), ...(opt.mod||{})};
      st.termEvent=null; st.phase='classroom';
      return st;
    }

    case 'SET_STATUS':                         // a.map: {id:status文案}
      return {...state, students: state.students.map(s=> a.map[s.id]!==undefined? {...s,status:a.map[s.id]} : s)};

    default: return state;
  }
}

function isValidSave(s){
  return !!(s && s.v>=3 && typeof s.term==='number' && Array.isArray(s.students) && s.students.length===9 && s.phase);
}

window.ENGINE={reducer,newGame,computeResult,settleTerm,drawCards,checkChain,rollTermEvent,applyFxToStudent,interestMod,localStatus,isValidSave,store,compactMessages,clamp,ri,rnd};
})();
</script>

<script>
/* =================================================================
   AI 层 · 调云雾(serverless) + 超时兜底。file:// 或失败 → 返回 null
   ================================================================= */
window.AI = (function(){
  async function call(type, payload, timeout){
    if(location.protocol==='file:') return null;          // 本地双击:无服务端,走兜底
    try{
      const ctrl=new AbortController();
      const t=setTimeout(()=>ctrl.abort(), timeout||8000);
      const res=await fetch('/api/ai',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({type,payload}),signal:ctrl.signal});
      clearTimeout(t);
      if(!res.ok) return null;
      const data=await res.json();
      return data&&data.ok? data.result : null;
    }catch(e){ return null; }
  }
  return {call};
})();
</script>

<script>
/* =================================================================
   音效层 · AUDIO — BGM(优先用 assets/audio 里的文件,缺省静音) +
   SFX(WebAudio 合成,零素材即可发声;放了同名文件会优先用文件)。
   静音状态持久化;首次用户手势时解锁音频。
   ================================================================= */
window.AUDIO = (function(){
  let ctx=null, masterMuted=false, unlocked=false, vol=0.8;
  const bgmCache={}, sfxFiles={}, listeners=new Set(); let curBgm=null, targetBgm=null;
  try{ masterMuted = localStorage.getItem('shan_muted')==='1'; const v=parseFloat(localStorage.getItem('shan_vol')); if(!isNaN(v)) vol=v; }catch(e){}

  function ac(){ if(!ctx){ try{ ctx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ ctx=null; } } return ctx; }
  function emit(){ const state={muted:masterMuted, volume:vol}; listeners.forEach(fn=>{try{fn(state);}catch(e){}}); }
  function onChange(fn){ listeners.add(fn); return ()=>listeners.delete(fn); }
  function unlock(retryBgm){ unlocked=true; const c=ac(); if(c&&c.state==='suspended') c.resume();
    if(window.Howler&&Howler.ctx&&Howler.ctx.state==='suspended'){ try{Howler.ctx.resume();}catch(e){} }
    if(retryBgm&&targetBgm){ const retry=targetBgm; curBgm=null; bgm(retry); }
  }

  // —— 合成音效 ——
  function tone(specs){
    const c=ac(); if(!c||masterMuted) return; const now=c.currentTime;
    specs.forEach(s=>{
      const o=c.createOscillator(), g=c.createGain();
      o.type=s.type||'sine'; o.frequency.setValueAtTime(s.f, now+(s.t||0));
      if(s.f2) o.frequency.exponentialRampToValueAtTime(s.f2, now+(s.t||0)+(s.d||0.12));
      const peak=(s.g||0.18)*vol, at=s.a||0.005, dur=s.d||0.12;
      g.gain.setValueAtTime(0.0001, now+(s.t||0));
      g.gain.exponentialRampToValueAtTime(peak, now+(s.t||0)+at);
      g.gain.exponentialRampToValueAtTime(0.0001, now+(s.t||0)+at+dur);
      o.connect(g); g.connect(c.destination);
      o.start(now+(s.t||0)); o.stop(now+(s.t||0)+at+dur+0.02);
    });
  }
  const SYNTH={
    tap:   ()=>tone([{f:430,type:'triangle',g:0.10,d:0.05}]),
    page:  ()=>tone([{f:300,type:'sine',g:0.08,d:0.05}]),
    card:  ()=>tone([{f:520,type:'triangle',g:0.12,d:0.07},{f:760,type:'triangle',g:0.10,d:0.08,t:0.06}]),
    coin:  ()=>tone([{f:880,type:'square',g:0.10,d:0.05},{f:1320,type:'square',g:0.10,d:0.10,t:0.05}]),
    up:    ()=>tone([{f:560,f2:840,type:'sine',g:0.14,d:0.16}]),
    down:  ()=>tone([{f:440,f2:240,type:'sine',g:0.12,d:0.18}]),
    buy:   ()=>tone([{f:660,type:'triangle',g:0.12,d:0.07},{f:990,type:'triangle',g:0.10,d:0.09,t:0.06}]),
    talent:()=>tone([{f:660,type:'sine',g:0.13,d:0.10},{f:880,type:'sine',g:0.13,d:0.10,t:0.09},{f:1320,type:'sine',g:0.13,d:0.16,t:0.18}]),
    drop:  ()=>tone([{f:240,f2:150,type:'sawtooth',g:0.13,d:0.4}]),
    win:   ()=>tone([{f:523,type:'sine',g:0.14,d:0.14},{f:659,type:'sine',g:0.14,d:0.14,t:0.12},{f:784,type:'sine',g:0.14,d:0.14,t:0.24},{f:1046,type:'sine',g:0.15,d:0.3,t:0.36}]),
    toast: ()=>tone([{f:700,type:'sine',g:0.08,d:0.06}])
  };
  const SFX_SRC={
    tap:'assets/audio/sfx/tap.mp3',
    page:'assets/audio/sfx/page.mp3',
    card:'assets/audio/sfx/card.mp3',
    coin:'assets/audio/sfx/coin.mp3',
    buy:'assets/audio/sfx/buy.mp3',
    up:'assets/audio/sfx/up.mp3',
    down:'assets/audio/sfx/down.mp3',
    talent:'assets/audio/sfx/talent.mp3',
    drop:'assets/audio/sfx/drop.mp3',
    win:'assets/audio/sfx/win.mp3',
    toast:'assets/audio/sfx/toast.mp3'
  };
  const SFX_GAIN={ tap:.45,page:.55,card:.55,coin:.7,buy:.65,up:.58,down:.62,talent:.62,drop:.58,win:.68,toast:.48 };
  function ensureSfx(name){
    if(!window.Howl || !SFX_SRC[name]) return null;
    if(sfxFiles[name]===null) return null;
    if(!sfxFiles[name]){
      try{
        sfxFiles[name]=new Howl({src:[SFX_SRC[name]],volume:(SFX_GAIN[name]||.6)*vol,preload:true,onloaderror:()=>{sfxFiles[name]=null;}});
      }catch(e){ sfxFiles[name]=null; }
    }
    return sfxFiles[name];
  }
  function sfx(name){ if(masterMuted) return; unlock();
    const h=ensureSfx(name);
    if(h){ try{ h.volume((SFX_GAIN[name]||.6)*vol); h.play(); return; }catch(e){} }
    (SYNTH[name]||SYNTH.tap)();
  }

  // —— BGM(文件可选,缺省静默) ——
  const BGM_SRC={ theme:'assets/audio/bgm/theme.mp3', class:'assets/audio/bgm/class.mp3', chat:'assets/audio/bgm/chat.mp3', ending:'assets/audio/bgm/ending.mp3' };
  function bgm(name){
    targetBgm=name;
    if(!window.Howl){ return; }
    if(curBgm===name && bgmCache[name] && bgmCache[name].playing()) return;
    Object.keys(bgmCache).forEach(k=>{ const h=bgmCache[k]; if(k!==name&&h&&h.playing&&h.playing()) h.fade(h.volume(),0,600); });
    if(!name){ curBgm=null; return; }
    if(!bgmCache[name]){
      try{ bgmCache[name]=new Howl({src:[BGM_SRC[name]],loop:true,volume:0,html5:true,onloaderror:()=>{bgmCache[name]=null;}}); }
      catch(e){ bgmCache[name]=null; }
    }
    const h=bgmCache[name]; curBgm=name; if(!h||masterMuted) return;
    unlock(false); try{ if(!h.playing()) h.play(); h.fade(0,0.4*vol,800); h.once('playerror',()=>{curBgm=null;}); }catch(e){ curBgm=null; }
  }
  function setMuted(m){ masterMuted=!!m; try{ localStorage.setItem('shan_muted', m?'1':'0'); }catch(e){}
    if(window.Howler){ try{ Howler.mute(masterMuted); }catch(e){} }
    if(masterMuted){ Object.keys(bgmCache).forEach(k=>{ const h=bgmCache[k]; try{ h&&h.pause&&h.pause(); }catch(e){} }); }
    else { const c=curBgm; curBgm=null; bgm(c); }
    emit();
  }
  function isMuted(){ return masterMuted; }

  // 首次手势解锁 + 通用点击音
  document.addEventListener('pointerdown',(e)=>{ unlock(true);
    const t=e.target.closest&&e.target.closest('button,.actbtn,.choice,.chat-chip,.tcard,.house-card,.stu-row,.seat-info,.chat-close,.chat-send');
    if(t && !t.disabled){ sfx('tap'); }
  }, true);

  function setVolume(v){ vol=Math.max(0,Math.min(1,v)); try{ localStorage.setItem('shan_vol', String(vol)); }catch(e){}
    const h=curBgm&&bgmCache[curBgm]; if(h&&!masterMuted){ try{ h.volume(0.4*vol); }catch(e){} }
    Object.keys(sfxFiles).forEach(k=>{ const s=sfxFiles[k]; if(s){ try{s.volume((SFX_GAIN[k]||.6)*vol);}catch(e){} } });
    emit();
  }
  function getVolume(){ return vol; }
  return { sfx, bgm, setMuted, isMuted, setVolume, getVolume, onChange, unlock };
})();

/* =================================================================
   特效层 · FX — 命令式挂到 DOM,与 React 解耦(飘字/撒花/抖动/闪光)
   ================================================================= */
window.FX = (function(){
  function float(x,y,text,color){
    const el=document.createElement('div'); el.className='float-num'; el.textContent=text;
    if(color) el.style.color=color;
    el.style.left=x+'px'; el.style.top=y+'px';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(), 1100);
  }
  function floatAt(ev,text,color){ if(!ev) return;
    const x=ev.clientX||(ev.touches&&ev.touches[0]&&ev.touches[0].clientX)||window.innerWidth/2;
    const y=ev.clientY||(ev.touches&&ev.touches[0]&&ev.touches[0].clientY)||window.innerHeight/2;
    float(x,y-10,text,color);
  }
  function shake(){ const a=document.querySelector('.app'); if(!a) return; a.classList.remove('fx-shake'); void a.offsetWidth; a.classList.add('fx-shake'); setTimeout(()=>a.classList.remove('fx-shake'),520); }
  function flash(color){ const el=document.createElement('div'); el.className='fx-flash'; if(color) el.style.background=color; document.body.appendChild(el); setTimeout(()=>el.remove(),520); }
  function celebrate(){ if(!window.confetti) return; window.confetti({particleCount:80,spread:70,origin:{y:0.6},colors:['#D9A441','#7BA05B','#E8853A','#C99A2E','#FFF']}); }
  function bigCelebrate(){ if(!window.confetti) return;
    const end=Date.now()+1200;
    (function frame(){
      window.confetti({particleCount:5,angle:60,spread:55,origin:{x:0},colors:['#D9A441','#E8853A','#7BA05B']});
      window.confetti({particleCount:5,angle:120,spread:55,origin:{x:1},colors:['#D9A441','#E8853A','#7BA05B']});
      if(Date.now()<end) requestAnimationFrame(frame);
    })();
  }
  return { float, floatAt, shake, flash, celebrate, bigCelebrate };
})();
</script>

<script type="text/babel" data-presets="react">
/* =================================================================

const {useState,useEffect,useRef,useReducer,useCallback}=React;
const D=window.GAME_DATA, E=window.ENGINE, AI=window.AI;

const atRisk=s=>!!s && !s.dropped && s.study<D.WIN && s.fam>=65 && s.trust<35;
const toGo=s=>Math.max(0,Math.ceil(D.WIN-s.study));

	const STUDENT_ASSET_IDS = new Set(['damao','xiaohua','chouwa','xingxing','mumu','danzai','goushen','ahua','matui']);

		};
		const PERSONA_CACHE = {};
		async function loadPersona(id){
		  if(!id) return null;
		  if(Object.prototype.hasOwnProperty.call(PERSONA_CACHE,id)) return PERSONA_CACHE[id];
		  try{
		    const r=await fetch(`data/personas/${id}.json`,{cache:'no-store'});

		    visitKnowledge:[stu.family]

			function characterMemory(state,id){
			  const m=state&&state.memories&&state.memories[id];
			  return m || {summary:'',notes:[],interactions:[]};
			}
			const SAVE_KEY='shan_v3';
			const ATTR_LABELS={study:'学习',interest:'兴趣',press:'压力',fam:'家庭压迫',trust:'信任'};
			function outcomeCatalog(kind){
			  return kind==='visit' ? D.VISIT_OUTCOMES : D.CHAT_OUTCOMES;
			}
			function pickFallbackOutcome(kind,stu){
			  if(kind==='visit'){
			    if(stu.fam>=55) return 'family_understood';
			    if(stu.press>=55) return 'burden_reduced';
			    return 'family_trust';
			  }
			  if(stu.press>=60) return 'pressure_relief';
			  if(stu.interest<=2) return 'interest_rekindled';
			  if(stu.study<=12) return 'study_confidence';
			  if(stu.fam>=55) return 'family_disclosure';
			  return 'trust_built';
			}
			function resolveOutcome(kind,tag,stu){
			  const catalog=outcomeCatalog(kind);
			  const key=(tag&&catalog[tag])?tag:pickFallbackOutcome(kind,stu);
			  return {...catalog[key], id:key};
			}
			function applyPreviewValue(stu,key,delta){
			  const base=Number(stu[key]||0);
			  const max=key==='interest'?10:100;
			  return {key,label:ATTR_LABELS[key]||key,before:base,after:E.clamp(base+delta,0,max),delta};
			}
			function buildSettlement(kind,ai,stu,turnCount){
			  const raw=ai&&ai.settlement&&typeof ai.settlement==='object'?ai.settlement:{};
			  const outcome=resolveOutcome(kind,raw.outcomeTag,stu);
			  const fx={...(outcome.fx||{})};
			  const changes=Object.keys(fx).map(k=>applyPreviewValue(stu,k,fx[k]));
			  const profileUpdate=String(raw.profileUpdate||ai&&ai.memorySummary||outcome.desc||'').slice(0,48);
			  return {
			    ready:!!raw.ready,
			    outcome,
			    fx,
			    changes,
			    title:String(raw.title||outcome.title||'对话结算').slice(0,18),
			    teacherSummary:String(raw.teacherSummary||raw.summary||`老师记下了这次谈话的重点。`).slice(0,120),
			    studentReaction:String(raw.studentReaction||outcome.desc||'学生把这句话记在了心里。').slice(0,100),
			    profileUpdate,
			    memoryNote:String(raw.memoryNote||ai&&ai.memoryNote||outcome.desc||'一次重要的谈话').slice(0,60),
			    memorySummary:String(raw.memorySummary||ai&&ai.memorySummary||profileUpdate||outcome.desc||'关系有了新的变化').slice(0,80),
			    unlock:!!outcome.unlock && stu.talent!=='none' && !stu.talentShown,
			    turnCount
			  };
			}
			function shouldForceSettle(dialogue,nextLines,nextTurn){
			  const max=dialogue.maxMessages||D.MAX_CHAT_MESSAGES||30;
			  return nextTurn>=4 || nextLines.length>=Math.max(8,max-4);
			}
			function localTeacherOpening(stu,kind){
			  if(kind==='visit') return `我是${stu.name}的老师,今天想来听听家里的实际难处。`;
			  if(stu.press>=60) return `${stu.name},最近是不是有点累?老师想听你说说。`;
			  if(stu.interest<=2) return `${stu.name},最近对学习是不是有点提不起劲?我们随便聊聊。`;
			  if(stu.study<=10) return `${stu.name},刚起步慢慢来,不用急。老师陪你理一理。`;
			  return `${stu.name},今天找你随便聊聊,最近有啥新鲜事吗?`;
			}

/* ---- 头像：优先使用项目内 QQ 人切片，缺图时退回种子化 SVG ---- */
function FallbackAvatar({seed,size}){
  let h=0;for(const c of seed)h=(h*31+c.charCodeAt(0))>>>0;
  const skin=['#f3c9a0','#e8b88a','#d9a878'][h%3], shirt=['#7BA05B','#5B7FA0','#C25B4E','#C99A2E','#E8853A'][h%5];
  const hair=['#3a2a20','#241a12','#4a3424'][(h>>2)%3];
  const sz=size||44;
  return(<svg className="avatar-fallback" viewBox="0 0 44 44" width={sz} height={sz}>
    <circle cx="22" cy="22" r="21" fill="#efe5cd"/>
    <path d="M8,44 q14,-15 28,0 Z" fill={shirt}/>
    <circle cx="22" cy="19" r="11" fill={skin}/>
    <path d={(h%2)?'M11,17 q11,-13 22,0 l0,-5 q-11,-8 -22,0 Z':'M11,18 q3,-12 11,-12 q9,0 11,12 q-6,-6 -11,-6 q-6,0 -11,6 Z'} fill={hair}/>
    <circle cx="18" cy="19.5" r="1.4" fill="#2a1d12"/><circle cx="26" cy="19.5" r="1.4" fill="#2a1d12"/>
    <path d={`M18.5,${23+(h%3===0?0:1)} q3.5,${h%3===1?0:2.5} 7,0`} stroke="#2a1d12" strokeWidth="1.2" fill="none"/>
  </svg>);
}
	function Avatar({seed,size}){
  const sz=size||44;
  const [failed,setFailed]=useState(false);
  if(STUDENT_ASSET_IDS.has(seed) && !failed){
    return <img className="qq-avatar" src={imgPath('qq',seed)} alt={`${seed}头像`} width={sz} height={sz} style={{width:sz,height:sz}} onError={()=>setFailed(true)}/>;
  }
	  return <FallbackAvatar seed={seed} size={sz}/>;
	}
		function CharacterPortrait({id,label}){
		  const pid=portraitAssetId(id);
		  const [failed,setFailed]=useState(false);
		  if((STUDENT_ASSET_IDS.has(pid)||ADULT_ASSET_IDS.has(pid)) && !failed){

		  }
		  return <FallbackAvatar seed={pid||label||'teacher'} size={120}/>;
		}

		function normalizeLines(lines, fallbackSpeaker, fallbackText, fallbackPortrait){
		  const source=Array.isArray(lines)?lines:[];
	  const mapped=source.map(x=>{
	    if(typeof x==='string') return {speaker:fallbackSpeaker,text:x};
	    return {speaker:x&&x.speaker,text:x&&(x.text||x.t),portraitId:x&&x.portraitId,mc:x&&x.mc};
	  }).filter(x=>String(x.text||'').trim());
	  const usable=mapped.length?mapped:[{speaker:fallbackSpeaker,text:fallbackText||'',portraitId:fallbackPortrait}];
		  return usable.slice(0,80).map(x=>{
	    const speaker=String(x.speaker||fallbackSpeaker||'老师').slice(0,12);
	    const teacher=/老师|周老师|主角/.test(speaker);
	    const chen=/老陈|陈校长|校长/.test(speaker);
	    const portraitId=x.portraitId || (teacher?'teacher':(chen?'chen':fallbackPortrait));
	    return {
	      speaker,
	      text:String(x.text||'').slice(0,220),
	      portraitId,
	      mc:x.mc!==undefined?!!x.mc:teacher
	    };
	  });
	}

/* ---- 打字机 ---- */
function useTyper(text,speed){
  const [out,setOut]=useState(''); const [done,setDone]=useState(false);
  useEffect(()=>{ setOut('');setDone(false); let i=0;
    const id=setInterval(()=>{i++;setOut(text.slice(0,i));if(i>=text.length){setDone(true);clearInterval(id)}}, speed||26);
    return()=>clearInterval(id);
  },[text]);
  return [out,done,()=>{setOut(text);setDone(true)}];
}

/* ---- 教室 + 拖拽换位 ---- */
function Classroom({state,dispatch,toast}){
  const seats=[...Array(9)].map((_,i)=> state.students.find(s=>s.seat===i));
  const [drag,setDrag]=useState(null), [over,setOver]=useState(null);
  const [detail,setDetail]=useState(null);
  const [perk,setPerk]=useState(-1);

  // 教室"活气"：偶尔有个孩子抬起头
  useEffect(()=>{ let off=null; const id=setInterval(()=>{ const alive=state.students.filter(s=>!s.dropped); if(!alive.length) return; const seat=alive[Math.floor(Math.random()*alive.length)].seat; setPerk(-1); requestAnimationFrame(()=>setPerk(seat)); clearTimeout(off); off=setTimeout(()=>setPerk(-1),1050); },2600); return()=>{clearInterval(id);clearTimeout(off);}; },[state.students]);

  // 指针拖拽（手机/电脑通用）
  const onDown=(i)=>(e)=>{ if(!seats[i]||seats[i].dropped) return; setDrag(i); };
  const onMove=(e)=>{ if(drag===null) return;
    const t=e.touches?e.touches[0]:e; const el=document.elementFromPoint(t.clientX,t.clientY);
    const seat=el&&el.closest('.seat'); setOver(seat?+seat.dataset.i:null);
  };
  const onUp=()=>{ if(drag!==null && over!==null && over!==drag){
      if(state.ap<=0){ toast('体力不足'); } else { dispatch({type:'SWAP_SEATS',i:drag,j:over}); }
    } setDrag(null);setOver(null);
  };

  return(<div className="stage" onPointerMove={onMove} onPointerUp={onUp} onTouchMove={onMove} onTouchEnd={onUp}>
    <div className="room-title">俯视教室 · 按住头像拖到另一个座位可换位（耗1体力）</div>
    <div className="room">
      <div className="seatgrid">
        {seats.map((s,i)=> s?(
          <div key={i} data-i={i}
            className={'seat'+(drag===i?' dragging':'')+(over===i?' over':'')+(s.dropped?' gone':'')+(perk===i&&drag===null?' perk':'')+(atRisk(s)?' atrisk':'')}
            onPointerDown={onDown(i)} onTouchStart={onDown(i)}>
            {!s.dropped && <button className="seat-info" onClick={e=>{e.stopPropagation();setDetail(s);}} title="查看详情">📋</button>}
            {atRisk(s) && <span className="risk-badge" title="快撑不住了">⚠</span>}
            <Avatar seed={s.id} size={40}/>
            <div className="nm">{s.name}{s.talentShown&&D.TALENTS[s.talent].ico?' '+D.TALENTS[s.talent].ico:''}</div>
            <div className="tg">{s.dropped?'已离开':(s.study>=D.WIN?'✅已走出大山':'距大山 '+Math.max(0,Math.ceil(D.WIN-s.study)))}</div>
          </div>
        ):<div key={i} className="seat" style={{opacity:.2}}/> )}
      </div>
      <div className="podium">— 讲 台 —</div>
    </div>
    {detail && <StudentDetail student={detail} onClose={()=>setDetail(null)}/>}
  </div>);
}

/* ---- 行动栏 ---- */
function ActionBar({state,dispatch,onChat,onVisit,onNext,toast}){

		/* ---- 对话播放器（私聊/家访/换位/事件通用）---- */

/* 集市卖菜：拖滑块凑出找零（精准拖动+心算，5单） */
function SellGame({onDone,onCancel}){
  const TOTAL=5;
  const gen=()=>{ const cost=2+Math.floor(Math.random()*17); const pay=[10,20,50].find(b=>b>cost)||50; return {cost,pay,change:pay-cost}; };
  const [q,setQ]=useState(gen); const [round,setRound]=useState(1);
  const [val,setVal]=useState(0); const [score,setScore]=useState(0); const [combo,setCombo]=useState(0); const [lock,setLock]=useState(false);
  const scoreRef=useRef(0);
  const submit=(e)=>{ if(lock) return; setLock(true);
    const diff=Math.abs(val-q.change);
    let g=0;
    if(diff===0){ g=25+combo*5; setCombo(c=>c+1); window.AUDIO&&AUDIO.sfx('coin'); window.FX&&FX.floatAt(e,'正好！+'+g,'#7BA05B'); }
    else if(diff<=2){ g=10; setCombo(0); window.AUDIO&&AUDIO.sfx('up'); window.FX&&FX.floatAt(e,'差一点 +'+g,'#C99A2E'); }
    else { setCombo(0); window.AUDIO&&AUDIO.sfx('down'); window.FX&&FX.floatAt(e,'找错了','#C25B4E'); }
    scoreRef.current+=g; setScore(scoreRef.current);
    setTimeout(()=>{ if(round>=TOTAL) onDone(Math.min(200,20+scoreRef.current)); else { setRound(r=>r+1); setQ(gen()); setVal(0); setLock(false);} },720);
  };
  return(<div className="stage">
    <div className="room-title">第 {round}/{TOTAL} 单 · 拖滑块凑出找零再确认（连击 {combo}）</div>
    <div className="work-card">
      <div className="work-q">顾客买菜 <b>¥{q.cost}</b>，给了 <b>¥{q.pay}</b><br/>把找零拨到正确数目</div>
      <div className="slider-val">¥{val}</div>
      <input className="work-slider" type="range" min="0" max="50" value={val} disabled={lock}
        onChange={e=>setVal(+e.target.value)}/>
      <button className="btn warm" style={{marginTop:14,minWidth:120}} disabled={lock} onClick={submit}>确认找零</button>
      <div className="work-score">已赚 ¥{Math.min(200,20+score)}</div>
    </div>
    <div style={{textAlign:'center',marginTop:10}}><button className="btn small ghost" onClick={onCancel}>不干了</button></div>
  </div>);
}

/* 挑水浇园：长按蓄力，水满到刻度松手（按住—松开，5次） */
function WaterGame({onDone,onCancel}){
  const TOTAL=5;
  const [attempt,setAttempt]=useState(1); const [power,setPower]=useState(0);
  const [target,setTarget]=useState(()=>{const lo=45+Math.floor(Math.random()*30);return {lo,hi:lo+14};});
  const [score,setScore]=useState(0); const [lock,setLock]=useState(false); const [holding,setHolding]=useState(false);
  const powerRef=useRef(0); const scoreRef=useRef(0); const timer=useRef(null);
  const start=()=>{ if(lock||holding) return; setHolding(true); powerRef.current=0; setPower(0);
    timer.current=setInterval(()=>{ powerRef.current=Math.min(100,powerRef.current+2.6); setPower(powerRef.current); if(powerRef.current>=100){clearInterval(timer.current);} },28);
  };
  const release=(e)=>{ if(!holding||lock) return; setHolding(false); clearInterval(timer.current); setLock(true);
    const p=powerRef.current; const inZone=p>=target.lo&&p<=target.hi;
    let g=0;
    if(inZone){ g=34; window.AUDIO&&AUDIO.sfx('coin'); window.FX&&FX.floatAt(e,'满了！+'+g,'#5B7FA0'); }
    else { const d=Math.min(Math.abs(p-target.lo),Math.abs(p-target.hi)); g=Math.max(0,16-Math.floor(d/3)); window.AUDIO&&AUDIO.sfx(g>0?'up':'down'); window.FX&&FX.floatAt(e,g>0?('洒了点 +'+g):'空了','#C99A2E'); }
    scoreRef.current+=g; setScore(scoreRef.current);
    setTimeout(()=>{ if(attempt>=TOTAL) onDone(Math.min(200,30+scoreRef.current)); else { setAttempt(a=>a+1); setPower(0); powerRef.current=0; const lo=42+Math.floor(Math.random()*34); setTarget({lo,hi:lo+14}); setLock(false);} },640);
  };
  useEffect(()=>()=>clearInterval(timer.current),[]);
  return(<div className="stage">
    <div className="room-title">第 {attempt}/{TOTAL} 桶 · 按住井绳蓄力，水到绿区就松手</div>
    <div className="water-wrap">
      <div className="water-gauge">
        <div className="water-target" style={{bottom:target.lo+'%',height:(target.hi-target.lo)+'%'}}/>
        <div className="water-fill" style={{height:power+'%'}}/>
        <div className="water-mark" style={{bottom:'calc('+power+'% - 1px)'}}/>
      </div>
      <button className="water-rope" disabled={lock}
        onPointerDown={start} onPointerUp={release} onPointerLeave={release}>
        {holding?'松手！':'按住蓄力'}
      </button>
      <div className="work-score">已赚 ¥{Math.min(200,30+score)}</div>
    </div>
    <div style={{textAlign:'center',marginTop:10}}><button className="btn small ghost" onClick={onCancel}>不干了</button></div>
  </div>);
}

/* 农忙接稻：拖动竹筐接落下的稻捆、躲烂稻（拖动+落物，~16秒） */
function HarvestGame({onDone,onCancel}){
  const [items,setItems]=useState([]); const [score,setScore]=useState(0); const [time,setTime]=useState(16); const [bx,setBx]=useState(50);
  const scoreRef=useRef(0); const bxRef=useRef(50); const areaRef=useRef(null);
  const move=(e)=>{ const r=areaRef.current&&areaRef.current.getBoundingClientRect(); if(!r) return;
    const cx=(e.touches&&e.touches[0]?e.touches[0].clientX:e.clientX); const p=E.clamp(((cx-r.left)/r.width)*100,8,92); bxRef.current=p; setBx(p); };
  useEffect(()=>{
    let nid=0;
    const spawn=setInterval(()=>{ setItems(a=>[...a,{id:++nid,x:8+Math.random()*84,y:-6,bad:Math.random()<0.25,vy:2.2+Math.random()*1.6}]); },520);
    const fall=setInterval(()=>{ setItems(a=>{ const keep=[];
      a.forEach(it=>{ const y=it.y+it.vy;
        if(y>=82 && y<92 && !it.caught && Math.abs(it.x-bxRef.current)<11){
          if(it.bad){ scoreRef.current-=10; window.AUDIO&&AUDIO.sfx('down'); } else { scoreRef.current+=12; window.AUDIO&&AUDIO.sfx('coin'); }
          setScore(scoreRef.current); return; // 接住,移除
        }
        if(y<100) keep.push({...it,y});
      });
      return keep; }); },55);
    const tick=setInterval(()=>setTime(t=>{ if(t<=1){clearInterval(tick);clearInterval(spawn);clearInterval(fall);} return t-1; }),1000);
    return()=>{clearInterval(spawn);clearInterval(fall);clearInterval(tick);};
  },[]);
  useEffect(()=>{ if(time<=0) setTimeout(()=>onDone(Math.min(200,30+Math.max(0,scoreRef.current))),300); },[time]);
  return(<div className="stage">
    <div className="room-title">拖动竹筐 🧺 接稻捆 🌾(+12)，躲开烂稻 🥀(-10)！保底 ¥30</div>
    <div className="mini" ref={areaRef} onPointerMove={move} onTouchMove={move}>
      <div className="mini-hud"><span>⏱ {time}s</span><span>💰 {Math.min(200,30+Math.max(0,score))}</span></div>
      {items.map(it=>(<div key={it.id} className="fall-item" style={{left:it.x+'%',top:it.y+'%'}}>{it.bad?'🥀':'🌾'}</div>))}
      <div className="basket" style={{left:bx+'%'}}>🧺</div>
    </div>
    <div style={{textAlign:'center',marginTop:8}}><button className="btn small ghost" onClick={onCancel}>不干了</button></div>
  </div>);
}

/* 写春联：时机条扫到甜区时下笔（看时机，6笔，甜区渐窄） */
function CoupletGame({onDone,onCancel}){
  const STROKES=6;
  const [stroke,setStroke]=useState(1); const [marker,setMarker]=useState(0);
  const [hits,setHits]=useState(0); const [combo,setCombo]=useState(0); const [lock,setLock]=useState(false);
  const mRef=useRef(0); const dir=useRef(1); const hitsRef=useRef(0); const anim=useRef(null);
  const zoneW=Math.max(14,30-stroke*2); const zoneLo=Math.max(6,50-zoneW/2+(stroke%2?6:-6)); const zoneHi=zoneLo+zoneW;
  useEffect(()=>{ anim.current=setInterval(()=>{ let m=mRef.current+dir.current*2.4; if(m>=100){m=100;dir.current=-1;} if(m<=0){m=0;dir.current=1;} mRef.current=m; setMarker(m); },26);
    return()=>clearInterval(anim.current); },[]);
  const press=(e)=>{ if(lock) return; setLock(true);
    const m=mRef.current; const inZone=m>=zoneLo&&m<=zoneHi;
    if(inZone){ const g=20+combo*6; hitsRef.current+=g; setHits(hitsRef.current); setCombo(c=>c+1); window.AUDIO&&AUDIO.sfx('coin'); window.FX&&FX.floatAt(e,'好笔！+'+g,'#C99A2E'); }
    else { setCombo(0); window.AUDIO&&AUDIO.sfx('down'); window.FX&&FX.floatAt(e,'歪了','#C25B4E'); }
    setTimeout(()=>{ if(stroke>=STROKES) onDone(Math.min(200,20+hitsRef.current)); else { setStroke(s=>s+1); setLock(false);} },520);
  };
  return(<div className="stage">
    <div className="room-title">第 {stroke}/{STROKES} 笔 · 滑到“墨韵甜区”时下笔（连击 {combo}）</div>
    <div className="work-card" style={{background:'linear-gradient(#c25b4e,#a8463b)',color:'#fff'}}>
      <div style={{fontSize:42,marginBottom:10}}>🧧</div>
      <div className="couplet-bar">
        <div className="couplet-zone" style={{left:zoneLo+'%',width:(zoneHi-zoneLo)+'%'}}/>
        <div className="couplet-marker" style={{left:marker+'%'}}/>
      </div>
      <button className="btn warm" style={{marginTop:16,minWidth:120}} disabled={lock} onClick={press}>下　笔</button>
      <div className="work-score" style={{color:'#ffe89a'}}>已赚 ¥{Math.min(200,20+hits)}</div>
    </div>
    <div style={{textAlign:'center',marginTop:8}}><button className="btn small ghost" onClick={onCancel}>不干了</button></div>
  </div>);
}

/* ---- 结局 ---- */
function Ending({result,onRestart}){
  const arch=result.arch;
  const head={丰收:'山,他们翻过去了',及格:'有人走了出去,也有遗憾',遗憾:'山,到底是高了点'}[arch];
  let body;
  const cn=n=>['零','一','两','三','四','五','六','七','八','九'][n]||n;
  if(arch==='丰收') body=`${cn(result.out)}个孩子走出了大山${result.dropped===0?'。一个都没少。':'。'}`;
  else if(arch==='及格') body=`${cn(result.out)}个孩子走出了大山${result.dropped>0?`，可惜少了${cn(result.dropped)}个。`:'，剩下的还在路上。'}`;
  else body=result.dropped>0?`这一届，没能送出去几个，还走了${cn(result.dropped)}个。`:'这一届，没能送出去几个。';
  useEffect(()=>{
    if(arch==='丰收'){ window.AUDIO&&AUDIO.sfx('win'); window.FX&&FX.bigCelebrate(); }
    else if(arch==='及格'&&result.out>0){ window.AUDIO&&AUDIO.sfx('up'); window.FX&&FX.celebrate(); }
    else { window.AUDIO&&AUDIO.sfx('down'); }
  },[]);
  const endBg={background:`linear-gradient(rgba(247,200,115,.5),rgba(232,133,58,.62)),url("${scenePath('ending_office')}") center/cover no-repeat`};
  return(<div className="app"><div className="titlepage" style={endBg}>
    <svg className="title-mtn" viewBox="0 0 800 200" preserveAspectRatio="none">
      <path d="M0,120 L120,40 L240,100 L370,20 L500,90 L620,36 L740,88 L800,60 L800,200 L0,200 Z" fill="#8a5a44" opacity=".55"/>
      <path d="M0,200 L0,160 Q400,120 800,164 L800,200 Z" fill="#6e4634" opacity=".8"/></svg>
    <div style={{zIndex:2,textAlign:'center'}}>
      <h1 className="serif" style={{fontSize:34,marginBottom:6}}>山那边</h1>
      <p style={{letterSpacing:4,marginBottom:16,color:'var(--ink)'}}>谢谢你,老师。</p>
      <div className="endbox">
        <div style={{fontSize:16,marginBottom:8}} className="serif">{head}</div>
        <div>{body}</div>
        {result.names.length>0 && <div style={{fontSize:12.5,color:'var(--soft)',marginTop:8}}>走出大山:{result.names.join('、')}</div>}
        <div style={{fontSize:12,color:'var(--soft)',marginTop:10}}>一个田埂的故事,一辆破自行车,一间漏雨的教室——和你。</div>
      </div>
      <button className="btn" style={{marginTop:18}} onClick={onRestart}>回到山那边</button>
    </div>
  </div></div>);
}

/* =========================== 主应用 =========================== */
function App(){
  const [state,dispatch]=useReducer(E.reducer, null, ()=>{
    return null;  // 先到标题页
  });
  const [screen,setScreen]=useState('title');
	  const [panel,setPanel]=useState(null);      // shop|log|chatpick

  const toast=useCallback(msg=>{ const id=Math.random(); setToasts(t=>[...t,{id,msg}]); window.AUDIO&&AUDIO.sfx('toast'); setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),1800); },[]);

  // 自动存档

  // 私聊：先开选择页 → 选人 → (AI或本地)生成对话 → dispatch OPEN_DIALOGUE
	  const onPickChat=async(stu)=>{

	    }else{
	      const teacherOpen={speaker:'老师',text:localTeacherOpening(stu,'chat'),portraitId:'teacher',mc:true};
	      dlg={who:stu.name,mc:false,kind:'chat',scene:'classroom_topdown',studentId:stu.id,portraitId:stu.id,lead:tpl.lead,
	        phase:'running',turnCount:0,maxMessages:D.MAX_CHAT_MESSAGES,

	  const continueDialogue=()=>{

	    if(!d) return;

	  const freeReply=async(text, visibleLines)=>{

	    if(!d||!d.studentId||replying) return;

	      id:stu.id,name:stu.name,kind:d.kind,persona,memory:characterMemory(state,stu.id),

	      recentLog:(state.log||[]).slice(-4)
	    },15000);

	    const aiLines=(ai&&Array.isArray(ai.lines)&&ai.lines.length)

	    const baseOpts=d.baseOpts||d.opts||[];
		    const nextOpts=(ai&&Array.isArray(ai.opts)&&ai.opts.length?ai.opts:d.opts||[]).slice(0,3).map((o,i)=>({
		      t:String(o.t||o.text||o).slice(0,40),

		      memoryNote:ai&&ai.memoryNote,
		      memorySummary:ai&&ai.memorySummary
		    }));
	    const nextTurn=(d.turnCount||0)+1;
	    const nextLines=[...baseLines,teacherLine,...aiLines].slice(-(d.maxMessages||D.MAX_CHAT_MESSAGES));

	    if(settlement && !(ai&&ai.settlement&&ai.settlement.ready)) settlement.ready=true;
	    const nextDialogue={...d,ai:!!ai,phase:settlement?'settlement':'running',turnCount:nextTurn,
	      lines:nextLines,lead:(aiLines[0]&&aiLines[0].text)||d.lead,opts:nextOpts.length?nextOpts:d.opts,
	      settlement,memoryNote:ai&&ai.memoryNote||d.memoryNote,memorySummary:ai&&ai.memorySummary||d.memorySummary,
	      memoryCount:(characterMemory(state,stu.id).interactions||[]).length+1};
	    dispatch({type:'UPDATE_DIALOGUE',dialogue:nextDialogue});
	    dispatch({type:'ADD_MEMORY',studentId:stu.id,entry:{
	      term:state.term,
	      kind:d.kind,
	      playerText:text,
	      note:ai&&ai.memoryNote?ai.memoryNote:`第${state.term}学期${d.kind==='visit'?'家访':'私聊'}:老师说「${text.slice(0,24)}」。`,
